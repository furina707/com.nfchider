name: Build Xposed Module

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > ${{ github.workspace }}/nfchider.jks

      - name: Build APKs
        run: |
          gradle assembleRelease assembleDebug --no-daemon
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/nfchider.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Collect APKs
        run: |
          cp app/build/outputs/apk/release/*.apk NfcHider-v1.0-release.apk
          cp app/build/outputs/apk/debug/*.apk NfcHider-v1.0-debug.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: NfcHider-v1.0-release
          path: NfcHider-v1.0-release.apk

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: NfcHider-v1.0-debug
          path: NfcHider-v1.0-debug.apk
