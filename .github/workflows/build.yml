name: Build Xposed Module

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode Keystore
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > ${{ github.workspace }}/nfchider.jks

      - name: Build Debug APK
        run: |
          ./gradlew assembleDebug --no-daemon

      - name: Build Release APK
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          ./gradlew assembleRelease --no-daemon
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/nfchider.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Collect APKs
        run: |
          mkdir -p artifacts
          if [ -f app/build/outputs/apk/debug/*.apk ]; then
            cp app/build/outputs/apk/debug/*.apk artifacts/NfcHider-debug.apk
          fi
          if [ -f app/build/outputs/apk/release/*.apk ]; then
            cp app/build/outputs/apk/release/*.apk artifacts/NfcHider-release.apk
          fi

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: NfcHider
          path: artifacts/